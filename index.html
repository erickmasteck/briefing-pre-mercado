<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Pré-Abertura · WIN 09:00</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#12151c;
    --board-edge:#0a0c11;
    --flap:#eee9de;
    --flap-shadow:#c9c3b4;
    --ink:#1c1c1a;
    --ink-dim:#5b5a55;
    --amber:#e0952b;
    --pos:#3f7d57;
    --neg:#b34a3d;
    --neutral:#6b6a63;
    --rule: rgba(238,233,222,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--board-edge);
    background-image:
      radial-gradient(circle at 50% -10%, #1c212b 0%, var(--board-edge) 55%);
    color:var(--flap);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:24px 16px 64px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    padding:8px 4px 20px;
    border-bottom:1px solid var(--rule);
    margin-bottom:22px;
  }
  .brand{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--amber);
    text-transform:uppercase;
  }
  h1{
    font-family:'Space Mono',monospace;
    font-size:22px;
    margin:6px 0 0;
    letter-spacing:0.02em;
    font-weight:700;
  }
  .clock{
    font-family:'Space Mono',monospace;
    text-align:right;
    font-size:12px;
    color:var(--flap-shadow);
    line-height:1.5;
  }
  .clock strong{color:var(--flap);font-size:15px;display:block;}

  .summary-board{
    background:var(--board);
    border:1px solid var(--rule);
    border-radius:6px;
    padding:20px;
    margin-bottom:26px;
    position:relative;
  }
  .summary-board::before{
    content:"RESUMO";
    position:absolute;
    top:-9px;left:16px;
    background:var(--board-edge);
    padding:0 8px;
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:0.14em;
    color:var(--amber);
  }
  .gap-line{
    font-family:'Space Mono',monospace;
    font-size:13px;
    color:var(--flap-shadow);
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .gap-line .tag{
    display:inline-block;
    padding:2px 8px;
    border-radius:3px;
    font-weight:700;
    margin-right:8px;
  }
  .tag.pos{background:rgba(63,125,87,0.25);color:#8fd6a8;}
  .tag.neg{background:rgba(179,74,61,0.25);color:#f0a294;}
  .tag.neutral{background:rgba(107,106,99,0.3);color:#cfcdc4;}
  .summary-text{font-size:14.5px;line-height:1.6;color:var(--flap);}

  .section{margin-bottom:22px;}
  .section-title{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--amber);
    margin:0 0 8px 4px;
  }
  .board{
    background:var(--board);
    border:1px solid var(--rule);
    border-radius:6px;
    overflow:hidden;
  }
  .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 16px;
    border-bottom:1px solid var(--rule);
    font-family:'Space Mono',monospace;
    font-size:13.5px;
  }
  .row:last-child{border-bottom:none;}
  .row .label{color:var(--flap-shadow);letter-spacing:0.01em;}
  .row .value{
    display:flex;align-items:center;gap:8px;
    font-weight:700;
  }
  .flap{
    background:var(--flap);
    color:var(--ink);
    border-radius:3px;
    padding:3px 9px;
    min-width:64px;
    text-align:center;
    box-shadow: 0 1px 0 var(--flap-shadow) inset;
  }
  .flap.positive{color:var(--pos);}
  .flap.negative{color:var(--neg);}
  .flap.neutral{color:var(--neutral);}

  ul.plain{
    list-style:none;margin:0;padding:0;
    background:var(--board);
    border:1px solid var(--rule);
    border-radius:6px;
  }
  ul.plain li{
    padding:11px 16px;
    border-bottom:1px solid var(--rule);
    font-size:13.5px;
    line-height:1.5;
    color:var(--flap);
  }
  ul.plain li:last-child{border-bottom:none;}
  ul.plain li::before{content:"▸ ";color:var(--amber);}

  footer{
    text-align:center;
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    color:var(--ink-dim);
    margin-top:34px;
    letter-spacing:0.06em;
  }
  .state{
    text-align:center;
    padding:60px 20px;
    font-family:'Space Mono',monospace;
    color:var(--flap-shadow);
    font-size:13px;
  }
  @media (max-width:480px){
    h1{font-size:18px;}
    .row{flex-direction:row;font-size:12.5px;padding:10px 12px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Painel Robôs · Pré-Mercado</div>
      <h1>Briefing 08:30</h1>
    </div>
    <div class="clock">
      Abertura WIN 09:00<br>
      <strong id="updated">—</strong>
    </div>
  </header>

  <div id="content">
    <div class="state">Carregando dados de hoje…</div>
  </div>

  <footer>GERADO AUTOMATICAMENTE · TAREFA AGENDADA CLAUDE · 08:30 BRT</footer>
</div>

<script>
async function loadData(){
  const el = document.getElementById('content');
  try{
    const res = await fetch('data.json', {cache:'no-store'});
    if(!res.ok) throw new Error('sem dados');
    const data = await res.json();
    render(data);
  }catch(e){
    el.innerHTML = '<div class="state">Ainda não há briefing publicado hoje.<br>Volte depois das 08:30.</div>';
  }
}

function toneClass(tone){
  if(tone === 'positive') return 'positive';
  if(tone === 'negative') return 'negative';
  return 'neutral';
}

function render(data){
  document.getElementById('updated').textContent = data.updated_at || '—';

  const gapTone = toneClass(data.gap_tone);
  let html = '';

  html += `<div class="summary-board">
    <div class="gap-line"><span class="tag ${gapTone}">${data.gap_estimate || 'N/D'}</span>Sentimento de abertura</div>
    <div class="summary-text">${data.summary || ''}</div>
  </div>`;

  (data.sections || []).forEach(section => {
    html += `<div class="section">
      <div class="section-title">${section.title}</div>
      <div class="board">`;
    (section.items || []).forEach(item => {
      html += `<div class="row">
        <span class="label">${item.label}</span>
        <span class="value"><span class="flap ${toneClass(item.tone)}">${item.value}</span></span>
      </div>`;
    });
    html += `</div></div>`;
  });

  if(data.agenda && data.agenda.length){
    html += `<div class="section">
      <div class="section-title">Agenda do dia</div>
      <ul class="plain">${data.agenda.map(a => `<li>${a}</li>`).join('')}</ul>
    </div>`;
  }

  if(data.news && data.news.length){
    html += `<div class="section">
      <div class="section-title">Notícias overnight</div>
      <ul class="plain">${data.news.map(n => `<li>${n}</li>`).join('')}</ul>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

loadData();
</script>
</body>
</html>
